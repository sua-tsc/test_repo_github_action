name: delete-branch-on-pr-close.yml
on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    # Only run if the PR was not merged via Github and the head branch is not a protected one
    # (case of rebase+push locally, for example)
    steps:
      - name: Delete head branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Skip if the PR was closed without being merged (abandoned feature)
            if (!context.payload.pull_request.merged) {
              console.log(`PR was closed without merge, keeping branch: ${branch}`);
              return;
            }

            // Skip if it's a protected branch name
            const protected = ['main', 'staging', 'pre-prod', 'inspector'];
            if (protected.includes(branch)) {
              console.log(`Skipping protected branch: ${branch}`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (e) {
              console.log(`Could not delete branch ${branch}: ${e.message}`);
            }
